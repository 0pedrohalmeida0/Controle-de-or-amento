<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Acesso</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="js/app.js"></script>
</head>

<body>
    <main>
        <h1>Controle de Gastos</h1>
        <form>
            <label for="valor">Valor:</label>
            <input type="number" id="valor" placeholder="Digite o valor gasto:" required>

            <select id="categoria">
                <option value="alimentacao">Alimentação</option>
                <option value="moradia">Moradia</option>
                <option value="transporte">Transporte</option>
                <option value="lazer">Lazer</option>
                <option value="educacao">Educação</option>
                <option value="saude">Saúde</option>
                <option value="outros">Outros</option>
            </select>
            <button type="button">Adicionar</button>
        </form>
        <p id="Alimentacao">Alimentação: R$ 0,00</p>
        <p id="Moradia">Moradia: R$ 0,00</p>
        <p id="Transporte">Transporte: R$ 0,00</p>
        <p id="Lazer">Lazer: R$ 0,00</p>
        <p id="Educacao">Educação: R$ 0,00</p>
        <p id="Saude">Saúde: R$ 0,00</p>
        <p id="Outros">Outros: R$ 0,00</p>
        <p id="Total">Total: R$ 0,00</p>
    </main>
</body>

</html>
